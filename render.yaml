services:
  - type: web
    name: atmosfearless-api
    runtime: python
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn backend.app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
    healthCheckPath: /api/health
    autoDeploy: true
